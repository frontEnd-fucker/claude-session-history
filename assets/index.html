<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会话历史查看器</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Diff2html for diff display -->
    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/diff2html.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/diff2html.min.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>会话历史</h1>
            </div>

            <!-- Filters -->
            <div class="filters">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索会话内容..." autocomplete="off">
                </div>
                <div class="search-results-panel" id="searchResultsPanel">
                    <div class="search-results-header">
                        <span class="search-results-count" id="searchResultsCount"></span>
                        <button class="search-close-btn" id="searchCloseBtn">×</button>
                    </div>
                    <div class="search-results-list" id="searchResultsList"></div>
                </div>
                <div class="filter-row">
                    <input type="date" id="startDate" placeholder="开始日期">
                    <span>-</span>
                    <input type="date" id="endDate" placeholder="结束日期">
                </div>
                <button id="applyFilters" class="btn-primary">应用筛选</button>
            </div>

            <!-- Session List -->
            <div class="session-list" id="sessionList">
                <div class="loading">加载中...</div>
            </div>

            <!-- Load More -->
            <div class="load-more" id="loadMore" style="display: none;">
                <button id="loadMoreBtn" class="btn-secondary">加载更多</button>
                <span class="load-more-info" id="loadMoreInfo"></span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="welcome" id="welcome">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
                <h2>欢迎使用会话历史查看器</h2>
                <p>从左侧选择一个会话开始查看</p>
            </div>

            <div class="session-detail" id="sessionDetail" style="display: none;">
                <div class="detail-header">
                    <h2 id="sessionTitle">会话详情</h2>
                    <div class="detail-meta">
                        <span id="sessionProject"></span>
                        <span id="sessionTime"></span>
                    </div>
                </div>

                <div class="detail-toolbar">
                    <label class="filter-tool-call">
                        <input type="checkbox" id="filterToolCalls" checked>
                        <span>隐藏工具调用</span>
                    </label>
                </div>

                <div class="messages" id="messages">
                    <!-- Messages will be rendered here -->
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
