<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会话历史查看器</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Diff2html for diff display -->
    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/diff2html.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/diff2html.min.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar - Project List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>项目列表</h1>
            </div>

            <!-- Project List -->
            <div class="project-list" id="projectList">
                <div class="loading">加载中...</div>
            </div>
        </aside>

        <!-- Main Content - Messages -->
        <main class="main-content">
            <div class="welcome" id="welcome">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
                <h2>欢迎使用会话历史查看器</h2>
                <p>从左侧选择一个项目查看所有消息</p>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer" style="display: none;">
                <div class="detail-header">
                    <h2 id="projectTitle">项目消息</h2>
                    <div class="detail-meta">
                        <span id="sessionCount"></span>
                        <span id="messageCount"></span>
                    </div>
                </div>

                <div class="detail-toolbar">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索消息内容..." autocomplete="off">
                        <div class="search-results-panel" id="searchResultsPanel">
                            <div class="search-results-header">
                                <span class="search-results-count" id="searchResultsCount"></span>
                                <button class="search-close-btn" id="searchCloseBtn">×</button>
                            </div>
                            <div class="search-results-list" id="searchResultsList"></div>
                        </div>
                    </div>
                    <label class="filter-tool-call">
                        <input type="checkbox" id="filterToolCalls" checked>
                        <span>隐藏工具调用</span>
                    </label>
                </div>

                <div class="messages" id="messages">
                    <!-- Messages will be rendered here -->
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
